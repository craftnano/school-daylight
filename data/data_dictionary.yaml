# ============================================================================
# SUPPRESSION RULES
# ============================================================================

suppression_rules:

  crdc:
    "-9":
      meaning: "Not applicable or skipped. School doesn't serve those grades, or data element doesn't apply."
      frequency_wa: 1132661
      store_as: "null"
      flag: "not_applicable: true"

    "-2":
      meaning: "Data not available. School should have reported but didn't."
      frequency_wa: "rare (not observed in WA in this run, but documented in manual)"
      store_as: "null"
      flag: "suppressed: true, reason: 'not_reported'"

    "-5":
      meaning: "Suppressed due to small count (fewer than 5 students in subgroup)."
      frequency_wa: 2744
      store_as: "null"
      flag: "suppressed: true, reason: 'small_count'"

    "-4":
      meaning: "Suppressed for teacher sex counts."
      frequency_wa: 1004
      store_as: "null"
      flag: "suppressed: true, reason: 'teacher_sex'"

    "-3":
      meaning: "Secondary suppression (related to another suppressed cell)."
      frequency_wa: 809
      store_as: "null"
      flag: "suppressed: true, reason: 'secondary_suppression'"

    "-12":
      meaning: "Observed in enrollment only (1,664 occurrences). May be a derived negative delta or rounding artifact."
      frequency_wa: 1664
      store_as: "null"
      flag: "suppressed: true, reason: 'unknown_negative'"
      confidence: "medium"
      note: "Needs investigation during pipeline testing. May appear in derived enrollment fields."

    "-13":
      meaning: "Observed in restraint/seclusion and corporal punishment (30 occurrences). Unknown meaning."
      frequency_wa: 30
      store_as: "null"
      flag: "suppressed: true, reason: 'unknown_negative'"
      confidence: "medium"

    "0":
      meaning: "GENUINE ZERO. Zero incidents reported. The school answered the question and the answer is zero."
      frequency_wa: 1354574
      store_as: "0"
      flag: "none — this is real data"
      critical_note: "Suppressed ≠ zero. This is the project's #1 data integrity rule."

  ospi:
    "N<10":
      meaning: "Fewer than 10 students in the subgroup. Suppressed for privacy."
      frequency_wa: "~550,000+ across all OSPI files"
      store_as: "null"
      flag: "suppressed: true, reason: 'n_lt_10'"

    "*":
      meaning: "Cell masked for privacy. Accompanies N<10 suppression in numeric count/rate columns."
      frequency_wa: "~323,000 in discipline alone"
      store_as: "null"
      flag: "suppressed: true, reason: 'masked'"

    "No Students":
      meaning: "No students in this category. Different from suppressed — there genuinely are zero qualifying students."
      frequency_wa: 109154
      store_as: "null"
      flag: "no_students: true"
      note: "This is NOT the same as a zero count. 'No Students' means the school doesn't have the program/grade, not that students didn't perform."

    "Top/Bottom Range":
      meaning: "Value is at extreme of range and might identify students. Shown as inequality (e.g., '<27.3%', '>72.7%')."
      frequency_wa: "~170,000+ in discipline"
      store_as: "null"
      flag: "suppressed: true, reason: 'top_bottom_range'"
      note: "Could parse the threshold value for approximate data, but would need to be flagged as approximate."
      confidence: "medium"

    "Cross Student Group - N<10":
      meaning: "Related group also has N<10, causing complementary suppression."
      frequency_wa: "~70,000+"
      store_as: "null"
      flag: "suppressed: true, reason: 'cross_group_n_lt_10'"

  ccd:
    "-1":
      meaning: "Data not available / not reported by the school."
      store_as: "null"
      flag: "suppressed: true, reason: 'not_reported'"

    "Not reported":
      meaning: "DMS_FLAG value indicating school did not report this data."
      frequency_wa: 6536
      store_as: "null"
      flag: "suppressed: true, reason: 'not_reported'"


# ============================================================================
# DATA VINTAGE NOTES
# ============================================================================

data_vintages:
  ccd_directory: "2024-25"
  ccd_membership: "2024-25"
  crdc: "2021-22"
  ospi_enrollment: "2023-24"
  ospi_assessment: "2023-24"
  ospi_discipline: "2023-24"
  ospi_growth: "2024-25 (with 2023-24 fallback)"
  ospi_sqss: "2024-25"
  ospi_ppe: "2023-24 (multi-year available 2019-2025)"

vintage_implications:
  - "CCD (2024-25) is newest. ~128 more WA schools than CRDC (2021-22) because schools opened after 2021-22."
  - "OSPI enrollment (2023-24) will differ from CCD enrollment (2024-25) because different years. Expected, not a bug."
  - "CRDC (2021-22) discipline data is 3+ years old. OSPI discipline (2023-24) is newer but less detailed."
  - "Schools that opened after 2021-22 will have no CRDC data. Briefing must note this."
  - "Enrollment numbers across sources will NOT match because they're different school years. The briefing must disclose the data vintage for each metric."
