# school_exclusions.yaml — Manual overrides for performance regression exclusion
#
# Schools on this list are excluded from the FRL-vs-proficiency regression
# and receive performance_flag = null with flag_absent_reason =
# "school_type_not_comparable". This is for edge cases where CCD codes a
# non-traditional school as "Regular School" but it still shouldn't be
# compared against traditional schools.
#
# CCD school_type already catches most cases ("Alternative School",
# "Special Education School", "Career and Technical School"). This list
# is for the ones CCD misses.
#
# To add a school: put its 12-character NCES ID and a plain-English reason.
# The reason is for human documentation only — the pipeline uses the same
# flag_absent_reason for all excluded schools.

excluded_schools:
  - ncessch: "530039003883"
    name: Bellevue Digital Discovery
    reason: >-
      Virtual/online school (K-12). CCD codes it as "Regular School" but
      it operates as a fully online program. Comparing a virtual school
      against brick-and-mortar schools on FRL-vs-proficiency is misleading.

  - ncessch: "530063003917"
    name: BOISTFORT ONLINE SCHOOL
    reason: >-
      Virtual/online school. CCD codes it as "Regular School" but
      it operates as a fully online program with statewide self-selected
      enrollment that breaks the peer comparison model.

  - ncessch: "530033002802"
    name: Mosaic Home Education Partnership
    reason: >-
      Homeschool cooperative. CCD codes it as "Alternative School" (already
      excluded by school_type filter), but listed here to document the
      edge case.
