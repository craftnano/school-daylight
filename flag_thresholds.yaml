# flag_thresholds.yaml — Phase 3 comparison engine configuration
#
# Contains all thresholds, band definitions, and flag metadata for the
# comparison engine. Separate from cleaning_rules.yaml because this file
# is about interpretation, not data ingestion.
#
# If you need to change a threshold, band boundary, or flag text,
# change it here — not in the Python code.

# ============================================================================
# PEER GROUP BAND DEFINITIONS
# ============================================================================

enrollment_bands:
  - name: Small
    min: 1
    max: 200
  - name: Medium
    min: 201
    max: 500
  - name: Large
    min: 501
    max: 999999   # No upper bound — just a large number

frl_bands:
  - name: LowFRL
    min: 0.00
    max: 0.35
  - name: MidFRL
    min: 0.36
    max: 0.65
  - name: HighFRL
    min: 0.66
    max: 1.00

# Maps CCD LEVEL values to our simplified level groups.
# "Secondary" schools get grouped with High because they include grades 9-12.
# "Other" and "Prekindergarten" don't fit standard grade spans.
level_groups:
  Elementary: Elementary
  Middle: Middle
  High: High
  Secondary: High
  Other: Other
  Prekindergarten: Other

# ============================================================================
# REGRESSION CONFIGURATION
# ============================================================================

regression:
  # Schools are flagged as outperforming/underperforming at this many SDs
  # from the predicted value. ±1.0 gives roughly 15%/70%/15% distribution.
  threshold_sd: 1.0

  # Minimum number of schools in a level group to fit a separate regression.
  # Groups smaller than this fall back to the statewide all-levels model.
  min_group_size: 30

  # scikit-learn model class. Only LinearRegression is supported.
  method: LinearRegression

  # X variable: FRL percentage (demographics.frl_pct)
  # Y variable: proficiency composite ((ELA + Math) / 2)

# ============================================================================
# PERCENTILE METRICS
# ============================================================================
# Each metric defines: the dotted field path in the school document,
# whether higher or lower values are "better" (affects percentile direction),
# and a human-readable label for receipts.

percentile_metrics:
  ela_proficiency_pct:
    field: academics.assessment.ela_proficiency_pct
    polarity: higher_is_better
    label: ELA Proficiency

  math_proficiency_pct:
    field: academics.assessment.math_proficiency_pct
    polarity: higher_is_better
    label: Math Proficiency

  regular_attendance_pct:
    field: academics.attendance.regular_attendance_pct
    polarity: higher_is_better
    label: Regular Attendance

  student_teacher_ratio:
    field: derived.student_teacher_ratio
    polarity: lower_is_better
    label: Student-Teacher Ratio

  counselor_student_ratio:
    field: derived.counselor_student_ratio
    polarity: lower_is_better
    label: Counselor-Student Ratio

  per_pupil_total:
    field: finance.per_pupil_total
    polarity: higher_is_better
    label: Per-Pupil Expenditure

  chronic_absenteeism_pct:
    field: derived.chronic_absenteeism_pct
    polarity: lower_is_better
    label: Chronic Absenteeism

  discipline_rate:
    field: discipline.ospi.rate
    polarity: lower_is_better
    label: Discipline Rate

# Minimum number of schools in a group to compute percentiles
percentile_min_district: 2    # District must have 2+ schools with data
percentile_min_peer: 5        # Peer cohort must have 5+ schools with data

# ============================================================================
# CLIMATE & EQUITY FLAGS
# ============================================================================
# Each flag defines thresholds for yellow and red, the source field,
# and the metadata text templates that get stored with every flagged school.
#
# The metadata text is the SAME for every school that trips the same flag
# at the same color. It is structured data, not AI-generated.

flags:
  chronic_absenteeism:
    field: derived.chronic_absenteeism_pct
    yellow_threshold: 0.20
    red_threshold: 0.30
    threshold_source: >-
      USED chronic absenteeism benchmarks (20% yellow, 30% red);
      aligned with federal Every Student Succeeds Act reporting thresholds
      and foundation document v0.2.
    yellow:
      what_it_means: >-
        More than 20% of students at this school are chronically absent,
        meaning they miss 10% or more of school days. This is above the
        threshold researchers identify as a warning sign for academic outcomes.
      what_it_might_not_mean: >-
        Chronic absenteeism reflects many factors beyond school quality,
        including family health crises, transportation barriers, housing
        instability, and community-wide events. A high rate does not
        necessarily indicate a school climate problem.
      parent_question: >-
        What programs does the school have to support students with
        attendance challenges, and how has the trend changed over
        the past two years?
    red:
      what_it_means: >-
        More than 30% of students at this school are chronically absent.
        At this level, a significant share of students are missing enough
        school to meaningfully affect their learning outcomes.
      what_it_might_not_mean: >-
        Chronic absenteeism reflects many factors beyond school quality,
        including family health crises, transportation barriers, housing
        instability, and community-wide events. A high rate does not
        necessarily indicate a school climate problem.
      parent_question: >-
        What is the school doing to address chronic absenteeism, and
        are there specific supports available for families facing
        attendance barriers?

  counselor_ratio:
    field: derived.counselor_student_ratio
    yellow_threshold: 400
    red_threshold: 500
    threshold_source: >-
      American School Counselor Association (ASCA) recommends a maximum
      ratio of 1:250. Thresholds of 1:400 (yellow) and 1:500 (red) are
      set conservatively above the recommendation; foundation document v0.2.
    yellow:
      what_it_means: >-
        This school has more than 400 students per counselor, well above
        the ASCA-recommended maximum of 250:1. Students may have limited
        access to academic, social-emotional, and college/career counseling.
      what_it_might_not_mean: >-
        Some schools supplement counselor roles with other support staff
        (social workers, psychologists, community partners) not captured
        in this ratio. The ratio alone does not tell you whether students
        feel supported.
      parent_question: >-
        How does my child access counseling support, and are there
        other support staff (social workers, mentors) available beyond
        the school counselor?
    red:
      what_it_means: >-
        This school has more than 500 students per counselor. At this level,
        meaningful individual counseling is very difficult to provide.
        Research links high counselor caseloads to lower college enrollment
        rates and reduced social-emotional support.
      what_it_might_not_mean: >-
        Some schools supplement counselor roles with other support staff
        (social workers, psychologists, community partners) not captured
        in this ratio. The ratio alone does not tell you whether students
        feel supported.
      parent_question: >-
        Does the school have plans to add counseling capacity, and what
        alternative support resources are available to students?

  discipline_disparity:
    field: derived.discipline_disparity_max
    yellow_threshold: 2.0
    red_threshold: 3.0
    threshold_source: >-
      Discipline disparity ratio compares suspension rates of each racial
      group to white students. A ratio of 2.0 means a group is suspended
      at twice the rate. Thresholds aligned with OCR enforcement guidance
      and ProPublica Miseducation methodology; foundation document v0.2.
    yellow:
      what_it_means: >-
        At least one racial group at this school is suspended at more than
        twice the rate of white students. This pattern is common nationwide
        but warrants attention as a potential equity concern.
      what_it_might_not_mean: >-
        Disparity ratios do not prove discrimination. Differences may
        reflect referral patterns, policy implementation, community
        factors, or small sample sizes that amplify individual incidents.
        The ratio identifies a pattern worth investigating, not a
        conclusion.
      parent_question: >-
        Is the school aware of differences in discipline rates across
        student groups, and what steps are being taken to ensure
        equitable discipline practices?
    red:
      what_it_means: >-
        At least one racial group at this school is suspended at more than
        three times the rate of white students. This level of disparity
        is a significant equity concern that federal civil rights guidance
        identifies as warranting investigation.
      what_it_might_not_mean: >-
        Disparity ratios do not prove discrimination. Differences may
        reflect referral patterns, policy implementation, community
        factors, or small sample sizes that amplify individual incidents.
        The CRDC data is from 2021-22 and may not reflect current practices.
      parent_question: >-
        Has the school conducted a discipline equity audit, and what
        specific changes have been made to address disparities in
        suspension rates?

  # No-counselor is a special case: it's not a threshold flag, it's binary.
  # Schools with zero counselor FTE get this flag regardless of thresholds.
  no_counselor:
    field: staffing.counselor_fte
    condition: equals_zero
    threshold_source: >-
      CRDC staffing data reports 0.0 counselor FTE for this school.
    red:
      what_it_means: >-
        This school reports zero counselor staff. Students at this school
        do not have access to a dedicated school counselor for academic,
        social-emotional, or college/career guidance.
      what_it_might_not_mean: >-
        Some schools share counselors with other buildings or contract
        counseling services that may not appear in staffing reports.
        The school may also use other support models (social workers,
        community partnerships) not captured in this data.
      parent_question: >-
        How does the school provide counseling and social-emotional
        support to students without a dedicated counselor on staff?

# ============================================================================
# FLAG ABSENT REASONS
# ============================================================================
# When a flag cannot be computed, one of these reasons is stored.
# Only high-confidence reasons — no speculation.

flag_absent_reasons:
  grade_span_not_tested:
    description: >-
      School's grade span does not include tested grades (3-8, 10).
      Assessment and growth data are not expected for this school.
    # Tested grades for WA state assessments (SBA/WCAS)
    tested_grades:
      - "03"
      - "04"
      - "05"
      - "06"
      - "07"
      - "08"
      - "10"

  suppressed_n_lt_10:
    description: >-
      The underlying metric was suppressed because the student count
      was below 10, per state or federal privacy rules.

  data_not_available:
    description: >-
      Data for this metric is not available for this school.
      No further inference is made about why.
